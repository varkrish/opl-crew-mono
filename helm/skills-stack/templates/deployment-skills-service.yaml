{{- if .Values.skillsService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skills-stack.skillsService.fullname" . }}
  labels:
    {{- include "skills-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: skills-service
spec:
  replicas: {{ .Values.skillsService.replicaCount }}
  selector:
    matchLabels:
      {{- include "skills-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: skills-service
  template:
    metadata:
      labels:
        {{- include "skills-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: skills-service
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: skills-service
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.skillsService.image.repository }}:{{ .Values.skillsService.image.tag }}"
          imagePullPolicy: {{ .Values.skillsService.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          env:
            - name: SKILLS_BASE_DIRS
              value: "/app/skills/base,/app/skills/frappe,/app/skills/marketplace"
            - name: SKILLS_INDEX_CACHE_DIR
              value: "/app/cache/index"
            - name: HF_HOME
              value: "/app/cache/hf"
            - name: TRANSFORMERS_CACHE
              value: "/app/cache/hf"
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - name: skills-base
              mountPath: /app/skills/base
            - name: skills-frappe
              mountPath: /app/skills/frappe
            - name: marketplace
              mountPath: /app/skills/marketplace
              readOnly: true
            - name: skills-cache
              mountPath: /app/cache
            {{- with .Values.skillsService.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.skillsService.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: skills-base
          emptyDir: {}
        - name: skills-frappe
          emptyDir: {}
        - name: marketplace
          {{- if .Values.marketplace.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "skills-stack.fullname" . }}-marketplace
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: skills-cache
          {{- if .Values.skillsService.cache.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "skills-stack.fullname" . }}-skills-cache
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- with .Values.skillsService.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
