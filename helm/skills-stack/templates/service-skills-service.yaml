{{- if .Values.skillsService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "skills-stack.skillsService.fullname" . }}
  labels:
    {{- include "skills-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: skills-service
spec:
  type: {{ .Values.skillsService.service.type }}
  ports:
    - port: {{ .Values.skillsService.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "skills-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: skills-service
{{- end }}
