{{- if and .Values.skillsManager.enabled (not .Values.skillsService.enabled) }}
{{- fail "skillsManager.enabled requires skillsService.enabled=true" }}
{{- end }}
{{- if .Values.skillsManager.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skills-stack.skillsManager.fullname" . }}
  labels:
    {{- include "skills-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: skills-manager
spec:
  replicas: {{ .Values.skillsManager.replicaCount }}
  selector:
    matchLabels:
      {{- include "skills-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: skills-manager
  template:
    metadata:
      labels:
        {{- include "skills-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: skills-manager
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.skillsService.enabled }}
      initContainers:
        - name: wait-skills
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              URL="http://{{ include "skills-stack.skillsService.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.skillsService.service.port }}/health"
              for i in $(seq 1 120); do
                if wget -qO- "$URL" >/dev/null 2>&1; then
                  echo "skills-service is up"
                  exit 0
                fi
                echo "waiting for skills-service ($i)..."
                sleep 2
              done
              echo "timeout waiting for skills-service"
              exit 1
      {{- end }}
      containers:
        - name: skills-manager
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.skillsManager.image.repository }}:{{ .Values.skillsManager.image.tag }}"
          imagePullPolicy: {{ .Values.skillsManager.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8091
              protocol: TCP
          env:
            - name: SKILLS_SERVICE_URL
              value: "http://{{ include "skills-stack.skillsService.fullname" . }}:{{ .Values.skillsService.service.port }}"
            - name: SKILLS_MARKETPLACE_DIR
              value: "/app/skills/marketplace"
            - name: PYTHONUNBUFFERED
              value: "1"
            {{- if .Values.skillsManager.existingSecret }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.skillsManager.existingSecret }}
                  key: {{ .Values.skillsManager.existingSecretKey }}
            {{- else if .Values.skillsManager.githubToken }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "skills-stack.fullname" . }}-github
                  key: GITHUB_TOKEN
            {{- end }}
          volumeMounts:
            - name: marketplace
              mountPath: /app/skills/marketplace
          {{- with .Values.skillsManager.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: marketplace
          {{- if .Values.marketplace.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "skills-stack.fullname" . }}-marketplace
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
