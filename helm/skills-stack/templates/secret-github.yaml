{{- if and .Values.skillsManager.enabled .Values.skillsManager.githubToken (not .Values.skillsManager.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "skills-stack.fullname" . }}-github
  labels:
    {{- include "skills-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  GITHUB_TOKEN: {{ .Values.skillsManager.githubToken | quote }}
{{- end }}
