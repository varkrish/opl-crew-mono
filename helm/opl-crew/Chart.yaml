apiVersion: v2
name: opl-crew
description: OPL Crew Platform — AI-powered software development with Jira integration
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: backend
    version: 0.1.0
    repository: file://charts/backend
    condition: backend.enabled

  - name: frontend
    version: 0.1.0
    repository: file://charts/frontend
    condition: frontend.enabled

  - name: validator
    version: 0.1.0
    repository: file://charts/validator
    condition: validator.enabled

  - name: connector
    version: 0.1.0
    repository: file://charts/connector
    condition: connector.enabled
