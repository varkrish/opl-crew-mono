apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/llm-config: {{ print .Release.Name "-llm-config" | sha256sum }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "backend.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: fix-config-perms
          image: registry.access.redhat.com/ubi9/ubi-micro:latest
          command: ["sh", "-c", "cp /secret/config.yaml /config/config.yaml && chmod 600 /config/config.yaml"]
          volumeMounts:
            - name: llm-config
              mountPath: /secret
              readOnly: true
            - name: config-fixed
              mountPath: /config
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.image.digest }}
          image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          {{- else }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: WORKSPACE_PATH
              value: /app/workspace
            - name: JOB_DB_PATH
              value: /app/data/crew_jobs.db
            - name: CONFIG_FILE_PATH
              value: /app/config.yaml
            - name: FLASK_ENV
              value: {{ .Values.env.FLASK_ENV | quote }}
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: NLTK_DATA
              value: /tmp/nltk_data
            - name: VALIDATOR_URL
              value: "http://{{ .Release.Name }}-validator:8080"
            {{- if .Values.env.SKILLS_SERVICE_URL }}
            - name: SKILLS_SERVICE_URL
              value: {{ .Values.env.SKILLS_SERVICE_URL | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-llm-config
                optional: true
          volumeMounts:
            - name: workspace
              mountPath: /app/workspace
            - name: data
              mountPath: /app/data
            - name: config-fixed
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-workspace
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-backend-data
        - name: llm-config
          secret:
            secretName: {{ .Release.Name }}-llm-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: config-fixed
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
