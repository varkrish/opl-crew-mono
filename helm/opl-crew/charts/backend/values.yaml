replicaCount: 1

image:
  repository: quay.io/varkrish/crew-backend
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: crew-backend.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  FLASK_ENV: production
  OLLAMA_BASE_URL: http://ollama:11434

config: |
  llm:
    provider: openai
    model: gpt-4o-mini

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

persistence:
  workspace:
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  data:
    size: 2Gi
    storageClass: ""
    accessMode: ReadWriteOnce
