{{- if .Values.route.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jira.fullname" . }}-server-xml
  labels:
    {{- include "jira.labels" . | nindent 4 }}
data:
  server.xml: |
    <?xml version="1.0" encoding="utf-8"?>
    <Server port="8005" shutdown="SHUTDOWN">
        <Listener className="org.apache.catalina.startup.VersionLoggerListener"/>
        <Listener className="org.apache.catalina.core.AprLifecycleListener" SSLEngine="on"/>
        <Listener className="org.apache.catalina.core.JreMemoryLeakPreventionListener"/>
        <Listener className="org.apache.catalina.mbeans.GlobalResourcesLifecycleListener"/>
        <Listener className="org.apache.catalina.core.ThreadLocalLeakPreventionListener"/>
        <Service name="Catalina">
            <Connector port="8080"
                       relaxedPathChars="[]|"
                       relaxedQueryChars="[]|{}^\`&quot;&lt;&gt;"
                       maxThreads="150"
                       minSpareThreads="25"
                       connectionTimeout="20000"
                       enableLookups="false"
                       maxHttpHeaderSize="8192"
                       protocol="HTTP/1.1"
                       useBodyEncodingForURI="true"
                       redirectPort="8443"
                       acceptCount="100"
                       disableUploadTimeout="true"
                       bindOnInit="false"
                       secure="true"
                       scheme="https"
                       proxyName="{{ .Values.proxyName }}"
                       proxyPort="443"/>
            <Engine name="Catalina" defaultHost="localhost">
                <Host name="localhost" appBase="webapps" unpackWARs="true" autoDeploy="true">
                    <Context path="" docBase="${catalina.home}/atlassian-jira" reloadable="false" useHttpOnly="true">
                        <Resource name="UserTransaction" auth="Container" type="javax.transaction.UserTransaction"
                                  factory="org.objectweb.jotm.UserTransactionFactory" jotm.timeout="60"/>
                        <Manager pathname=""/>
                        <JarScanner scanManifest="false"/>
                        <Valve className="org.apache.catalina.valves.StuckThreadDetectionValve" threshold="120"/>
                    </Context>
                </Host>
                <Valve className="org.apache.catalina.valves.AccessLogValve"
                       pattern="%a %{jira.request.id}r %{jira.request.username}r %t &quot;%m %U%{sanitized.query}r %H&quot; %s %b %D &quot;%{sanitized.referer}r&quot; &quot;%{User-Agent}i&quot; &quot;%{jira.request.assession.id}r&quot;"/>
            </Engine>
        </Service>
    </Server>
{{- end }}
