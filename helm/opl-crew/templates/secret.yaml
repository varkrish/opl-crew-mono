{{- if .Values.apiKeys.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-api-keys
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.apiKeys.OPENAI_API_KEY | quote }}
  ANTHROPIC_API_KEY: {{ .Values.apiKeys.ANTHROPIC_API_KEY | quote }}
  OPENROUTER_API_KEY: {{ .Values.apiKeys.OPENROUTER_API_KEY | quote }}
{{- end }}
