# ─────────────────────────────────────────────────────────────────────────────
# OPL Crew — Umbrella Chart Values
# ─────────────────────────────────────────────────────────────────────────────

# ── LLM / Red Hat MaaS Configuration ─────────────────────────────────────
# Shared across backend and connector. Backend reads config.yaml (Secret);
# connector uses LLM_API_KEY / LLM_API_BASE_URL env vars.
llm:
  apiKey: ""
  apiBaseUrl: "https://litellm-prod.apps.maas.redhatworkshops.io"
  environment: production

  # Models served by the MaaS gateway
  modelManager: "qwen3-14b"
  modelWorker: "deepseek-r1-distill-qwen-14b"
  modelReviewer: "deepseek-r1-distill-qwen-14b"

  maxTokens: 8192
  temperature: 0.7
  embeddingModel: "text-embedding-3-small"

  # Ollama (only used when environment=local)
  ollamaBaseUrl: "http://localhost:11434"
  ollamaModel: "llama3.2:latest"

# ── Backend ───────────────────────────────────────────────────────────────
backend:
  enabled: true
  replicaCount: 1
  image:
    repository: quay.io/varkrish/crew-backend
    tag: "latest"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: false
  env:
    FLASK_ENV: production
    SKILLS_SERVICE_URL: ""
  persistence:
    workspace:
      size: 5Gi
      storageClass: ""
      accessMode: ReadWriteOnce
    data:
      size: 2Gi
      storageClass: ""
      accessMode: ReadWriteOnce
  resources:
    requests:
      cpu: 250m
      memory: 5Gi
    limits:
      cpu: "2"
      memory: 5Gi

# ── Frontend ──────────────────────────────────────────────────────────────
frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: quay.io/varkrish/crew-frontend
    digest: sha256:b550b95ebefc592c8c93f2b85430d50708aaa61d41bb8d47201d4e73bfa99587
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: false
  env:
    BACKEND_HOST: opl-crew-backend
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

# ── Validator ─────────────────────────────────────────────────────────────
validator:
  enabled: true
  replicaCount: 1
  image:
    repository: quay.io/varkrish/crew-validator
    tag: "latest"
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: false
  env:
    LOG_LEVEL: INFO
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Jira Server ──────────────────────────────────────────────────────────
jira:
  enabled: true
  replicaCount: 1
  image:
    repository: docker.io/atlassian/jira-software
    tag: "9.4.0"
  service:
    type: ClusterIP
    port: 8080
  route:
    enabled: true
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi

# ── Skills Service (optional) ─────────────────────────────────────────────
# Agents degrade gracefully without this — they just lose framework-specific
# guidance and fall back to generic patterns.
skills-service:
  enabled: false
  replicaCount: 1
  image:
    repository: quay.io/varkrish/crew-skills-service
    tag: "latest"
  service:
    type: ClusterIP
    port: 8090
  env:
    SKILLS_BASE_DIRS: /app/skills/base
    SKILLS_INDEX_CACHE_DIR: /app/cache
  persistence:
    cache:
      enabled: true
      size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# ── Jira Connector ───────────────────────────────────────────────────────
connector:
  enabled: true
  replicaCount: 1
  image:
    repository: quay.io/varkrish/crew-jira-connector
    tag: "latest"
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: false
  env:
    CREW_STUDIO_URL: ""
    JIRA_BACKEND: rest
    JIRA_BASE_URL: ""
    JIRA_TRIGGER_STATUS: "Ready for Dev"
    LLM_MODEL: "deepseek-r1-distill-qwen-14b"
  jiraSecret:
    create: true
    JIRA_EMAIL: ""
    JIRA_API_TOKEN: ""
    JIRA_USERNAME: ""
    JIRA_PASSWORD: ""
    JIRA_PERSONAL_ACCESS_TOKEN: ""
    JIRA_PROJECT_KEYS: ""
    JIRA_WEBHOOK_SECRET: ""
  persistence:
    size: 1Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
