# ─────────────────────────────────────────────────────────────────────────────
# OPL Crew Mono — Full Stack Compose (Production)
# Services: Backend, Frontend, Validator, Jira, Jira Connector
# Compatible with: podman-compose, docker compose
#
# Usage:
#   podman compose up -d              # start all services
#   podman compose up -d --build      # rebuild local images and start
#   podman compose logs -f            # follow all logs
#   podman compose down               # stop all
#   podman compose down -v            # stop + remove volumes
#
# Environment:
#   Copy .env.example → .env and fill in API keys before starting.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Backend: FastAPI ASGI + AI Agents ────────────────────────────────────
  backend:
    container_name: crew-backend
    image: quay.io/varkrish/crew-backend:latest
    platform: linux/amd64
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - crew-workspace:/app/workspace
      - crew-data:/app/data
      - ${CONFIG_FILE:-./opl-ai-software-team/config.yaml}:/app/config.yaml:ro,z
    environment:
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-https://litellm-prod.apps.maas.redhatworkshops.io}
      - WORKSPACE_PATH=/app/workspace
      - JOB_DB_PATH=/app/data/crew_jobs.db
      - CONFIG_FILE_PATH=/app/config.yaml
      - MOUNT_FLASK_FALLBACK=1
      - VALIDATOR_URL=http://validator:8080
      - SKILLS_SERVICE_URL=http://skills-service:8090
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    depends_on:
      validator:
        condition: service_healthy
    networks:
      - crew-net

  # ── Frontend: React + PatternFly (Nginx) ─────────────────────────────────
  frontend:
    container_name: crew-frontend
    image: quay.io/varkrish/crew-frontend:latest
    platform: linux/amd64
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - crew-net

  # ── Code Validator: FastAPI Microservice ─────────────────────────────────
  validator:
    container_name: crew-validator
    build:
      context: ./crew-code-validator
      dockerfile: Containerfile
    image: crew-code-validator:latest
    ports:
      - "${VALIDATOR_PORT:-8180}:8080"
    volumes:
      - crew-workspace:/app/workspace:ro
    environment:
      - LOG_LEVEL=${VALIDATOR_LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    networks:
      - crew-net

  # ── Jira Server ─────────────────────────────────────────────────────────
  jira:
    container_name: jira
    image: docker.io/atlassian/jira-software:9.4.0
    platform: linux/amd64
    ports:
      - "${JIRA_PORT:-8081}:8080"
    volumes:
      - jira-data:/var/atlassian/application-data/jira
    environment:
      - ATL_JIRA_HOME=/var/atlassian/application-data/jira
    restart: unless-stopped
    networks:
      - crew-net

  # ── Jira Connector: Webhook Bridge ──────────────────────────────────────
  connector:
    container_name: crew-jira-connector
    build:
      context: ./crew_jira_connector
      dockerfile: Containerfile
    image: crew-jira-connector:latest
    ports:
      - "${CONNECTOR_PORT:-8082}:8080"
    environment:
      - CREW_STUDIO_URL=http://backend:8080
      - JIRA_BACKEND=${JIRA_BACKEND:-rest}
      - JIRA_BASE_URL=${JIRA_BASE_URL:-http://jira:8080}
      - JIRA_EMAIL=${JIRA_EMAIL:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - JIRA_USERNAME=${JIRA_USERNAME:-}
      - JIRA_PASSWORD=${JIRA_PASSWORD:-}
      - JIRA_PERSONAL_ACCESS_TOKEN=${JIRA_PERSONAL_ACCESS_TOKEN:-}
      - JIRA_PROJECT_KEYS=${JIRA_PROJECT_KEYS:-}
      - JIRA_TRIGGER_STATUS=${JIRA_TRIGGER_STATUS:-Ready for Dev}
      - JIRA_WEBHOOK_SECRET=${JIRA_WEBHOOK_SECRET:-}
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-https://litellm-prod.apps.maas.redhatworkshops.io}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-deepseek-r1-distill-qwen-14b}
      - PYTHONUNBUFFERED=1
    volumes:
      - connector-data:/app/data
    depends_on:
      backend:
        condition: service_healthy
      jira:
        condition: service_started
    restart: unless-stopped
    networks:
      - crew-net

  # ── Skills Service (optional): Semantic search over skill docs ──────────
  # Agents degrade gracefully without this — they just lose framework-specific
  # guidance and fall back to generic patterns. Uncomment to enable.
  #
  # skills-service:
  #   container_name: crew-skills
  #   build:
  #     context: ./skills-service
  #     dockerfile: Containerfile
  #   ports:
  #     - "${SKILLS_PORT:-8090}:8090"
  #   volumes:
  #     - ${SKILLS_DIR:-./opl-ai-software-team/skills}:/app/skills/base:ro
  #     - skills-cache:/app/cache
  #   environment:
  #     - SKILLS_BASE_DIRS=/app/skills/base
  #     - SKILLS_INDEX_CACHE_DIR=/app/cache
  #     - PYTHONUNBUFFERED=1
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8090/health/ready\")'"]
  #     interval: 30s
  #     timeout: 10s
  #     start_period: 60s
  #     retries: 5
  #   networks:
  #     - crew-net

volumes:
  crew-workspace:
    driver: local
  crew-data:
    driver: local
  connector-data:
    driver: local
  jira-data:
    driver: local
  # skills-cache:
  #   driver: local

networks:
  crew-net:
    driver: bridge
