# ─────────────────────────────────────────────────────────────────────────────
# OPL Crew Mono — Full Stack Compose (Community / Demo)
# Services: Keycloak, Backend, Frontend, Validator, Skills, Jira, Jira Connector
# Compatible with: podman-compose, docker compose
#
# Quick start (whole stack):
#   cp .env.example .env          # set LLM_API_KEY
#   podman compose -f compose.yml pull
#   podman compose -f compose.yml up -d
#
# Or via installer (no clone required):
#   curl -fsSL https://raw.githubusercontent.com/varkrish/opl-crew-mono/main/installer.sh | bash
#
# Common commands:
#   podman compose -f compose.yml logs -f
#   podman compose -f compose.yml down
#   podman compose -f compose.yml down -v   # wipe volumes
#
# Images default to :latest (current release). Pin a release with:
#   APP_VERSION=v2.4.0 podman compose -f compose.yml up -d
#
# Ports (defaults — override in .env if needed):
#   Frontend 3100 | Backend 8280 | Validator 8281 | Keycloak 8380
#   Skills 8090 | Skill Manager 8091 | Jira 8081 | Connector 8082
#
# Environment:
#   Copy .env.example → .env and fill in LLM_API_KEY before starting.
#   APP_VERSION — image tag for backend/frontend (default: latest)
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Keycloak Identity Provider ────────────────────────────────────────────
  keycloak:
    container_name: crew-keycloak-prod
    image: quay.io/keycloak/keycloak:26.0
    # KC 26+: health endpoints are disabled by default and live on :9000
    command: start-dev --import-realm --features=token-exchange --health-enabled=true
    ports:
      - "${KEYCLOAK_PORT:-8380}:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro,z
      - keycloak-data:/opt/keycloak/data/h2
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_HEALTH_ENABLED=true
    healthcheck:
      # Official KC pattern — HEAD /health/ready on management port 9000
      test: ["CMD-SHELL", "{ printf 'HEAD /health/ready HTTP/1.0\\r\\n\\r\\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000"]
      interval: 15s
      timeout: 5s
      start_period: 90s
      retries: 12
    restart: unless-stopped
    networks:
      - crew-net

  # ── Backend: FastAPI ASGI + AI Agents ────────────────────────────────────
  backend:
    container_name: crew-backend-prod
    image: ghcr.io/varkrish/crew-backend:${APP_VERSION:-latest}
    platform: linux/amd64
    ports:
      - "${BACKEND_PORT:-8280}:8080"
    volumes:
      - crew-workspace:/app/workspace
      - crew-data:/app/data
      - ${CONFIG_FILE:-./opl-ai-software-team/config.yaml}:/app/config.yaml:ro,z
    entrypoint: >
      /bin/sh -c "
        mkdir -p /app/workspace /app/data /app/cache /app/nltk_data
        cp /app/config.yaml /tmp/config.yaml
        chmod 600 /tmp/config.yaml
        python -m pip install -q --disable-pip-version-check fastapi 'uvicorn[standard]' pydantic PyJWT requests flask flask-cors jsonschema cryptography python-dotenv httpx rich gitpython watchdog pyyaml
        python -c \"import nltk; nltk.data.path.insert(0, '/app/nltk_data'); nltk.download('punkt', download_dir='/app/nltk_data', quiet=True); nltk.download('averaged_perceptron_tagger', download_dir='/app/nltk_data', quiet=True)\"
        export PYTHONPATH=/app/agent/src:/app/agent:/app
        export NLTK_DATA=/app/nltk_data
        export CONFIG_FILE_PATH=/tmp/config.yaml
        exec python -m uvicorn crew_studio.asgi_app:app --host 0.0.0.0 --port 8080
      "
    environment:
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-https://litellm-prod.apps.maas.redhatworkshops.io}
      - WORKSPACE_PATH=/app/workspace
      - JOB_DB_PATH=/app/data/crew_jobs.db
      - CONFIG_FILE_PATH=/app/config.yaml
      - MOUNT_FLASK_FALLBACK=1
      - VALIDATOR_URL=http://validator:8080
      - SKILLS_SERVICE_URL=${SKILLS_SERVICE_URL:-http://skills-service:8090}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:${FRONTEND_PORT:-3100},http://127.0.0.1:${FRONTEND_PORT:-3100}}
      - PARALLEL_FILE_WORKERS=${PARALLEL_FILE_WORKERS:-2}
      - PYTHONUNBUFFERED=1
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - KEYCLOAK_ISSUER_URL=${KEYCLOAK_ISSUER_URL:-http://localhost:${KEYCLOAK_PORT:-8380}/realms/opl-crew}
      - KEYCLOAK_JWKS_URL=${KEYCLOAK_JWKS_URL:-http://keycloak:8080/realms/opl-crew/protocol/openid-connect/certs}
      - HF_HOME=/tmp/hf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    depends_on:
      validator:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - crew-net

  # ── Frontend: React + PatternFly (Nginx) ─────────────────────────────────
  frontend:
    container_name: crew-frontend-prod
    image: ghcr.io/varkrish/crew-frontend:${APP_VERSION:-latest}
    platform: linux/amd64
    ports:
      - "${FRONTEND_PORT:-3100}:8080"
    environment:
      - BACKEND_HOST=backend
      # Map the shared AUTH_ENABLED flag to the frontend runtime env var so
      # env.js (generated by nginx at startup) disables OIDC when auth is off.
      - VITE_AUTH_ENABLED=${AUTH_ENABLED:-true}
      - VITE_OIDC_AUTHORITY=${VITE_OIDC_AUTHORITY:-http://localhost:${KEYCLOAK_PORT:-8380}/realms/opl-crew}
      - VITE_OIDC_CLIENT_ID=${VITE_OIDC_CLIENT_ID:-opl-studio}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - crew-net

  # ── Code Validator: FastAPI Microservice ─────────────────────────────────
  validator:
    container_name: crew-validator-prod
    image: quay.io/varkrish/crew-validator:latest
    platform: linux/amd64
    ports:
      - "${VALIDATOR_PORT:-8281}:8080"
    volumes:
      - crew-workspace:/app/workspace:ro
    environment:
      - LOG_LEVEL=${VALIDATOR_LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    networks:
      - crew-net

  # ── Jira Server ─────────────────────────────────────────────────────────
  jira:
    container_name: jira-prod
    image: docker.io/atlassian/jira-software:9.4.0
    platform: linux/amd64
    ports:
      - "${JIRA_PORT:-8081}:8080"
    volumes:
      - jira-data:/var/atlassian/application-data/jira
    environment:
      - ATL_JIRA_HOME=/var/atlassian/application-data/jira
    restart: unless-stopped
    networks:
      - crew-net

  # ── Jira Connector: Webhook Bridge ──────────────────────────────────────
  connector:
    container_name: crew-jira-connector-prod
    image: quay.io/varkrish/crew-jira-conntector:latest
    platform: linux/amd64
    ports:
      - "${CONNECTOR_PORT:-8082}:8080"
    environment:
      - CREW_STUDIO_URL=http://backend:8080
      - JIRA_BACKEND=${JIRA_BACKEND:-rest}
      - JIRA_BASE_URL=${JIRA_BASE_URL:-http://jira:8080}
      - JIRA_EMAIL=${JIRA_EMAIL:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - JIRA_USERNAME=${JIRA_USERNAME:-}
      - JIRA_PASSWORD=${JIRA_PASSWORD:-}
      - JIRA_PERSONAL_ACCESS_TOKEN=${JIRA_PERSONAL_ACCESS_TOKEN:-}
      - JIRA_PROJECT_KEYS=${JIRA_PROJECT_KEYS:-}
      - JIRA_TRIGGER_STATUS=${JIRA_TRIGGER_STATUS:-Ready for Dev}
      - JIRA_WEBHOOK_SECRET=${JIRA_WEBHOOK_SECRET:-}
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-https://litellm-prod.apps.maas.redhatworkshops.io}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-deepseek-r1-distill-qwen-14b}
      - PYTHONUNBUFFERED=1
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - KEYCLOAK_ISSUER_URL=${KEYCLOAK_ISSUER_URL:-http://localhost:${KEYCLOAK_PORT:-8380}/realms/opl-crew}
      - KEYCLOAK_JWKS_URL=${KEYCLOAK_JWKS_URL:-http://keycloak:8080/realms/opl-crew/protocol/openid-connect/certs}
      - NLTK_DATA=/app/cache/nltkarted
    volumes:
      - connector-data:/app/data
    depends_on:
      backend:
        condition: service_healthy
      jira:
        condition: service_started
    restart: unless-stopped
    networks:
      - crew-net

  # ── Skills Service: Semantic search over skill docs ─────────────────────
  skills-service:
    container_name: crew-skills-prod
    image: ${SKILLS_IMAGE:-quay.io/varkrish/skills-service:latest}
    ports:
      - "${SKILLS_PORT:-8090}:8090"
    volumes:
      - ${SKILLS_DIR:-./opl-ai-software-team/skills}:/app/skills/base:ro,z
      - skills-cache:/app/cache
      - skills-marketplace:/app/skills/marketplace:ro
    environment:
      - SKILLS_BASE_DIRS=/app/skills/base,/app/skills/marketplace
      - SKILLS_INDEX_CACHE_DIR=/app/cache
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8090/health\")'"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      - crew-net

  # ── Skill Manager: Marketplace install/delete and reload ─────────────────
  skill-manager:
    container_name: crew-skill-manager-prod
    image: ${SKILL_MANAGER_IMAGE:-quay.io/varkrish/skill-manager:latest}
    ports:
      - "${SKILL_MANAGER_PORT:-8091}:8091"
    volumes:
      - skills-marketplace:/app/skills/marketplace
    environment:
      - SKILLS_SERVICE_URL=http://skills-service:8090
      - SKILLS_MARKETPLACE_DIR=/app/skills/marketplace
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - PYTHONUNBUFFERED=1
    depends_on:
      skills-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8091/api/health\")'"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      - crew-net

volumes:
  crew-workspace:
    driver: local
  crew-data:
    driver: local
  connector-data:
    driver: local
  jira-data:
    driver: local
  keycloak-data:
    driver: local
  skills-cache:
    driver: local
  skills-marketplace:
    driver: local

networks:
  crew-net:
    driver: bridge
